<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Library Management System (jQuery CRUD)</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div class="brand">
          <div class="brand__mark" aria-hidden="true">L</div>
          <div class="brand__text">
            <div class="brand__title">Library Management</div>
            <div class="brand__subtitle">jQuery CRUD · localStorage</div>
          </div>
        </div>

        <nav class="nav" aria-label="Primary">
          <button class="nav__btn is-active" type="button" data-route="dashboard">Dashboard</button>
          <button class="nav__btn" type="button" data-route="books">Books</button>
          <button class="nav__btn" type="button" data-route="members">Members</button>
          <button class="nav__btn" type="button" data-route="circulation">Circulation</button>
        </nav>
      </header>

      <main class="main" id="appMain" tabindex="-1">
        <section class="card">
          <div class="card__header">
            <h1 class="card__title">Loading…</h1>
          </div>
          <div class="card__body">
            <p class="muted">If you can see this for long, JavaScript didn’t load.</p>
          </div>
        </section>
      </main>

      <footer class="footer">
        <div class="footer__left">
          <span class="muted">Phase 1 scaffold</span>
        </div>
        <div class="footer__right">
          <button type="button" class="link" id="resetDemoBtn">Reset demo data</button>
        </div>
      </footer>
    </div>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <!-- App -->
    <script src="./js/storage.js"></script>
    <script src="./js/app.js"></script>
  </body>
</html>
